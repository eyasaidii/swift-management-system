name: CI/CD Pipeline — BTL SWIFT Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: "8.2"
  NODE_VERSION: "22"

jobs:
  # ============================================================
  # 1. TESTS — Lint + Tests unitaires + Tests fonctionnels
  # ============================================================
  tests:
    name: Tests PHP & JS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, zip, bcmath, gd, pdo_sqlite
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader \
            --ignore-platform-req=ext-oci8 \
            --ignore-platform-req=ext-pdo_oci

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets (Vite)
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Configure SQLite for tests
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Pest tests
        run: ./vendor/bin/pest --ci

  # ============================================================
  # 2. SECURITY — Audit des dépendances
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Composer audit
        run: composer audit --no-interaction || true

      - name: NPM audit
        run: npm audit --audit-level=high || true

  # ============================================================
  # 3. BUILD — Construction de l'image Docker
  # ============================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ hashFiles('Dockerfile') }}
          restore-keys: docker-

      - name: Build image (validation)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: false
          tags: btl-swift-platform:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ============================================================
  # 4. DEPLOY — Déploiement (staging)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Deploying BTL SWIFT Platform to staging..."

      # Exemple SSH deploy (à adapter selon votre infra)
