services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btl_swift_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - btl_network

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: btl_oracle
    restart: unless-stopped
    environment:
      - ORACLE_PASSWORD=oracle
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - btl_network

volumes:
  oracle_data:

networks:
  btl_network:
    driver: bridge