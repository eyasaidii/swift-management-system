services:
  nginx:
    image: nginx:alpine
    container_name: btl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - btl_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btl_swift_app
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
    env_file:
      - .env
    environment:
      - PHP_CLI_SERVER_WORKERS=4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      oracle:
        condition: service_healthy
      python-api:
        condition: service_healthy
    networks:
      - btl_network

  python-api:
    build:
      context: ./swift-IA
      dockerfile: Dockerfile
    container_name: btl_python_api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - MODEL_DIR=/app/model
      - DATA_DIR=/app/data
      - ANOMALY_THRESHOLD=0.65
      - IF_CONTAMINATION=0.05
      - CORS_ORIGINS=http://btl_swift_app:8000,http://localhost:8000
      - LARAVEL_BASE_URL=http://btl_swift_app:8000
    volumes:
      # Montage live du code source pour dev instantané
      - ./swift-IA/:/app
      - python_model:/app/model
      - python_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - btl_network

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: btl_oracle
    restart: unless-stopped
    environment:
      - ORACLE_PASSWORD=oracle
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - btl_network

volumes:
  oracle_data:
  python_model:
  python_data:

networks:
  btl_network:
    driver: bridge