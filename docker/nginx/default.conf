server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # ── Compression gzip ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml;

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Headers sécurité ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Assets statiques (Vite build) ─────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Images & favicon ──────────────────────────────────────
    location ~* \.(ico|gif|jpg|jpeg|png|svg|webp|woff2?|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── WebSocket Reverb (proxy vers le serveur Reverb interne) ──
    location /app/ {
        proxy_pass         http://btl_swift_app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
    }

    # ── Laravel routing (proxy vers php artisan serve) ────────
    location / {
        proxy_pass         http://btl_swift_app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 30;
    }

    # ── Bloquer l'accès aux fichiers cachés ───────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }
}
