# ============================================================
# GitLab CI/CD Pipeline — BTL Swift Platform
# ============================================================
# Pipeline : Install → Lint → Test → Build Image → Deploy
# ============================================================

stages:
  - install
  - quality
  - test
  - build
  - deploy

# ── Variables globales ────────────────────────────────────────
variables:
  COMPOSER_HOME: "$CI_PROJECT_DIR/.composer"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE"
  PHP_IMAGE: "php:8.2-cli"
  NODE_VERSION: "22"

# ── Cache partagé ─────────────────────────────────────────────
.cache-composer: &cache-composer
  key: composer-$CI_COMMIT_REF_SLUG
  paths:
    - vendor/
    - .composer/
  policy: pull-push

.cache-npm: &cache-npm
  key: npm-$CI_COMMIT_REF_SLUG
  paths:
    - node_modules/
    - .npm/
  policy: pull-push

# ── Image PHP de base (sans Oracle) pour CI ───────────────────
.php-base:
  image: $PHP_IMAGE
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl zip unzip libpng-dev libonig-dev libxml2-dev libzip-dev > /dev/null
    - docker-php-ext-install pdo pdo_mysql mbstring zip exif pcntl bcmath gd > /dev/null 2>&1
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cp .env.example .env
    - sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
    - touch database/database.sqlite

# ============================================================
# STAGE: install
# ============================================================
install:composer:
  stage: install
  extends: .php-base
  cache:
    - <<: *cache-composer
  script:
    - composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-req=ext-oci8 --ignore-platform-req=ext-pdo_oci
    - php artisan key:generate
  artifacts:
    paths:
      - vendor/
      - .env
    expire_in: 1 hour

install:npm:
  stage: install
  image: node:${NODE_VERSION}-alpine
  cache:
    - <<: *cache-npm
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# ============================================================
# STAGE: quality (lint)
# ============================================================
lint:pint:
  stage: quality
  extends: .php-base
  needs:
    - job: install:composer
      artifacts: true
  cache:
    - <<: *cache-composer
      policy: pull
  script:
    - ./vendor/bin/pint --test
  allow_failure: false

lint:vite-build:
  stage: quality
  image: node:${NODE_VERSION}-alpine
  needs:
    - job: install:npm
      artifacts: true
  cache:
    - <<: *cache-npm
      policy: pull
  script:
    - npm run build
  artifacts:
    paths:
      - public/build/
    expire_in: 1 hour

# ============================================================
# STAGE: test
# ============================================================
test:pest:
  stage: test
  extends: .php-base
  needs:
    - job: install:composer
      artifacts: true
    - job: lint:vite-build
      artifacts: true
  cache:
    - <<: *cache-composer
      policy: pull
  script:
    - php artisan key:generate
    - php artisan config:clear
    - php artisan migrate --force --no-interaction
    - ./vendor/bin/pest --ci
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - report.xml
    expire_in: 7 days

# ============================================================
# STAGE: build (Docker image)
# ============================================================
build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs:
    - job: test:pest
    - job: lint:pint
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f Dockerfile.prod -t "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$DOCKER_IMAGE:latest" .
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKER_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "staging"

build:docker-tag:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs:
    - job: test:pest
    - job: lint:pint
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f Dockerfile.prod -t "$DOCKER_IMAGE:$CI_COMMIT_TAG" .
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# ============================================================
# STAGE: deploy
# ============================================================
deploy:staging:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build:docker
  environment:
    name: staging
    url: $STAGING_URL
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_STAGING" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS_STAGING" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER_STAGING@$SSH_HOST_STAGING << 'ENDSSH'
        cd $APP_PATH
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker compose -f docker-compose.prod.yml pull app
        docker compose -f docker-compose.prod.yml up -d --no-deps app
        docker exec btl_swift_app php artisan migrate --force
        docker exec btl_swift_app php artisan config:cache
        docker exec btl_swift_app php artisan route:cache
        docker exec btl_swift_app php artisan view:cache
      ENDSSH
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"

deploy:production:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build:docker
  environment:
    name: production
    url: $PRODUCTION_URL
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PRODUCTION" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS_PRODUCTION" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER_PRODUCTION@$SSH_HOST_PRODUCTION << 'ENDSSH'
        cd $APP_PATH
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker compose -f docker-compose.prod.yml pull app
        docker compose -f docker-compose.prod.yml up -d --no-deps app
        docker exec btl_swift_app php artisan migrate --force
        docker exec btl_swift_app php artisan config:cache
        docker exec btl_swift_app php artisan route:cache
        docker exec btl_swift_app php artisan view:cache
      ENDSSH
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual
